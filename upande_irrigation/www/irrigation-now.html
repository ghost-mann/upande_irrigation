{% extends "templates/web.html" %}

{% block title %}Irrigation Now{% endblock %}

{% block page_content %}
<style>
  :root {
    --in-bg: #f8fafc;
    --in-card: #ffffff;
    --in-border: #e2e8f0;
    --in-text: #0f172a;
    --in-muted: #64748b;
    --in-on: #16a34a;
    --in-on-bg: rgba(22,163,74,0.10);
    --in-idle: #94a3b8;
    --in-idle-bg: rgba(148,163,184,0.10);
    --in-accent: #0891b2;
    --in-track: #e2e8f0;
  }

  .in-wrap { font-family: var(--font-stack, -apple-system, system-ui, sans-serif); color: var(--in-text); padding: 16px; max-width: 1400px; margin: 0 auto; }
  .in-head { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:16px; }
  .in-title { font-size: 20px; font-weight: 700; margin: 0; }
  .in-sub { color: var(--in-muted); font-size: 12px; margin-top: 2px; }
  .in-meta { display:flex; gap:14px; align-items:center; flex-wrap:wrap; font-size: 12px; color: var(--in-muted); }
  .in-meta select { padding: 4px 8px; border: 1px solid var(--in-border); border-radius: 4px; font-size: 12px; background: var(--in-card); }
  .in-now { font-family: ui-monospace, "SF Mono", Menlo, monospace; padding: 4px 10px; background: var(--in-card); border: 1px solid var(--in-border); border-radius: 4px; }
  .in-btn { padding: 6px 14px; border-radius: 4px; border: 1px solid var(--in-border); background: var(--in-card); cursor: pointer; font-size: 12px; font-weight: 500; color: var(--in-text); }
  .in-btn:hover { border-color: var(--in-accent); }

  .in-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .in-stat { background: var(--in-card); border: 1px solid var(--in-border); border-radius: 8px; padding: 12px 14px; }
  .in-stat-label { font-size: 11px; color: var(--in-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .in-stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .in-stat .sw-on { color: var(--in-on); }
  .in-stat .sw-idle { color: var(--in-idle); }

  .in-farm { background: var(--in-card); border: 1px solid var(--in-border); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .in-farm-head { display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--in-border); }
  .in-farm-title { font-size: 14px; font-weight: 700; }
  .in-farm-meta { font-size: 11px; color: var(--in-muted); }

  .in-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .in-section { border: 1px solid var(--in-border); border-radius: 8px; padding: 14px; }
  .in-section.is-on  { border-left: 4px solid var(--in-on); background: var(--in-on-bg); }
  .in-section.is-idle { border-left: 4px solid var(--in-idle); }

  .in-sec-head { display:flex; align-items:center; justify-content:space-between; margin-bottom: 10px; }
  .in-sec-name { font-size: 14px; font-weight: 700; }
  .in-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .in-pill-on { background: var(--in-on); color: white; }
  .in-pill-idle { background: var(--in-idle); color: white; }

  .in-current { margin-bottom: 10px; }
  .in-shift { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .in-countdown { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 22px; font-weight: 700; color: var(--in-on); margin-bottom: 6px; }
  .in-times { font-size: 11px; color: var(--in-muted); display:flex; justify-content:space-between; margin-bottom: 8px; }
  .in-progress { height: 6px; background: var(--in-track); border-radius: 3px; overflow: hidden; }
  .in-progress-fill { height: 100%; background: var(--in-on); transition: width 1s linear; }

  .in-idle-msg { font-size: 12px; color: var(--in-muted); font-style: italic; padding: 8px 0; }

  .in-upcoming { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--in-border); }
  .in-upcoming-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--in-muted); margin-bottom: 6px; font-weight: 600; }
  .in-up-row { display:flex; justify-content:space-between; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--in-border); }
  .in-up-row:last-child { border-bottom: none; }
  .in-up-shift { font-weight: 600; }
  .in-up-time { color: var(--in-muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .in-up-hours { color: var(--in-muted); font-size: 11px; }

  .in-empty { text-align:center; color: var(--in-muted); padding: 28px; font-style: italic; }
  .in-loading { text-align:center; padding: 40px; color: var(--in-muted); font-style: italic; }
  .in-error { background: rgba(220,38,38,0.10); border: 1px solid #dc2626; color: #b91c1c; padding: 10px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 12px; }

  @media (max-width: 720px) {
    .in-summary { grid-template-columns: repeat(2, 1fr); }
  }
</style>

<div class="in-wrap">
  <div class="in-head">
    <div>
      <h1 class="in-title">Irrigation Now</h1>
      <div class="in-sub">Live section view · auto-refresh every 30 s · countdown updates each second</div>
    </div>
    <div class="in-meta">
      <label>Farm
        <select id="in-farm">
          <option value="">All Farms</option>
        </select>
      </label>
      <span>Now: <span class="in-now" id="in-now">—</span></span>
      <button id="in-refresh" class="in-btn">Refresh</button>
    </div>
  </div>

  <div id="in-status"></div>

  <div class="in-summary" id="in-summary"></div>

  <div id="in-body">
    <div class="in-loading">Loading…</div>
  </div>
</div>

<script>
(function(){
  const API = '/api/method/upande_irrigation.api.scheduler.live_sections';
  const POLL_MS = 30000;
  const TICK_MS = 1000;
  let pollTimer = null;
  let tickTimer = null;
  let currentFarm = '';
  let allFarms = new Set();
  let lastData = null;
  let lastFetchEpoch = 0;

  const $ = id => document.getElementById(id);
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function csrf(){
    const m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
    return m ? decodeURIComponent(m[1]) : '';
  }

  function setStatus(msg){
    const el = $('in-status');
    if(!msg){ el.innerHTML = ''; return; }
    el.innerHTML = `<div class="in-error">${esc(msg)}</div>`;
  }

  async function fetchLive(farm){
    let url = API;
    if(farm) url += '?farm=' + encodeURIComponent(farm);
    const r = await fetch(url, {
      method: 'GET',
      credentials: 'same-origin',
      headers: {
        'Accept': 'application/json',
        'X-Frappe-CSRF-Token': csrf(),
        'X-Requested-With': 'XMLHttpRequest',
      },
    });
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return (await r.json()).message;
  }

  function parseDt(s){
    if(!s) return null;
    const d = new Date(s.replace(' ', 'T'));
    return isNaN(d) ? null : d;
  }

  function fmtClock(s){
    const d = parseDt(s);
    if(!d) return '—';
    return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  }

  function fmtDayClock(s){
    const d = parseDt(s);
    if(!d) return '—';
    return d.toLocaleString([], {weekday: 'short', hour: '2-digit', minute: '2-digit'});
  }

  function fmtCountdown(seconds){
    if(seconds == null || seconds < 0) seconds = 0;
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    if(h > 0) return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    if(m > 0) return `${m}m ${String(s).padStart(2,'0')}s`;
    return `${s}s`;
  }

  function populateFarms(farms){
    const next = new Set(farms.map(f => f.farm).filter(Boolean));
    if(next.size === allFarms.size && [...next].every(f => allFarms.has(f))) return;
    allFarms = next;
    const sel = $('in-farm');
    const cur = sel.value;
    sel.innerHTML = '<option value="">All Farms</option>' + [...next].sort().map(f =>
      `<option value="${esc(f)}">${esc(f)}</option>`
    ).join('');
    sel.value = cur;
  }

  function flatSections(data){
    const out = [];
    (data.farms || []).forEach(f => (f.sections || []).forEach(s => out.push({farm: f.farm, ...s})));
    return out;
  }

  function renderSummary(data){
    const sections = flatSections(data);
    const total = sections.length;
    const active = sections.filter(s => s.current).length;
    const idle = total - active;
    $('in-summary').innerHTML = `
      <div class="in-stat">
        <div class="in-stat-label">Sections</div>
        <div class="in-stat-value">${total}</div>
      </div>
      <div class="in-stat">
        <div class="in-stat-label">Irrigating Now</div>
        <div class="in-stat-value sw-on">${active}</div>
      </div>
      <div class="in-stat">
        <div class="in-stat-label">Idle</div>
        <div class="in-stat-value sw-idle">${idle}</div>
      </div>
    `;
  }

  // Live timing: recompute from started_at/ends_at on the client so we don't
  // depend on the server-supplied seconds_remaining (which is only fresh
  // for ~30 s between polls).
  function liveTiming(current){
    const start = parseDt(current.started_at);
    const end   = parseDt(current.ends_at);
    if(!start || !end) {
      return {seconds_remaining: current.seconds_remaining || 0, pct: current.pct_complete || 0};
    }
    const now = new Date();
    const total = Math.max(1, (end - start) / 1000);
    const remaining = Math.max(0, Math.floor((end - now) / 1000));
    const elapsed = total - remaining;
    const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
    return {seconds_remaining: remaining, pct};
  }

  function sectionCard(s){
    const active = !!s.current;
    const cls = active ? 'is-on' : 'is-idle';
    const pillCls = active ? 'in-pill-on' : 'in-pill-idle';
    const pillTxt = active ? 'IRRIGATING' : 'IDLE';

    let body = '';
    if(active){
      const t = liveTiming(s.current);
      body = `
        <div class="in-current">
          <div class="in-shift">${esc(s.current.shift)}</div>
          <div class="in-countdown" data-countdown data-started="${esc(s.current.started_at)}" data-ends="${esc(s.current.ends_at)}">
            ${fmtCountdown(t.seconds_remaining)} left
          </div>
          <div class="in-times">
            <span>Started ${esc(fmtClock(s.current.started_at))}</span>
            <span>Ends ${esc(fmtClock(s.current.ends_at))}</span>
          </div>
          <div class="in-progress"><div class="in-progress-fill" data-progress style="width:${t.pct.toFixed(1)}%"></div></div>
        </div>
      `;
    } else {
      const nextStart = s.upcoming[0]?.starts_at;
      body = `<div class="in-idle-msg">No shift running. ${nextStart ? 'Next at ' + esc(fmtDayClock(nextStart)) + '.' : 'No upcoming shifts scheduled.'}</div>`;
    }

    let upcoming = '';
    if(s.upcoming && s.upcoming.length){
      upcoming = `
        <div class="in-upcoming">
          <div class="in-upcoming-label">Up next</div>
          ${s.upcoming.map(u => `
            <div class="in-up-row">
              <span class="in-up-shift">${esc(u.shift)}</span>
              <span class="in-up-time">${esc(fmtDayClock(u.starts_at))}</span>
              <span class="in-up-hours">${(u.shift_hours || 0).toFixed(1)} hr</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    return `
      <div class="in-section ${cls}">
        <div class="in-sec-head">
          <div class="in-sec-name">${esc(s.section)}</div>
          <span class="in-pill ${pillCls}">${pillTxt}</span>
        </div>
        ${body}
        ${upcoming}
      </div>
    `;
  }

  function farmBlock(f){
    const activeCount = f.sections.filter(s => s.current).length;
    return `
      <div class="in-farm">
        <div class="in-farm-head">
          <div class="in-farm-title">🌱 ${esc(f.farm)}</div>
          <div class="in-farm-meta">${f.sections.length} section${f.sections.length === 1 ? '' : 's'} · ${activeCount} active</div>
        </div>
        <div class="in-grid">
          ${f.sections.map(sectionCard).join('')}
        </div>
      </div>
    `;
  }

  function render(data){
    populateFarms(data.farms || []);
    renderSummary(data);
    $('in-now').textContent = fmtClock(data.now);

    const body = $('in-body');
    if(!data.farms || !data.farms.length){
      body.innerHTML = '<div class="in-empty">No active or upcoming shifts. Run the scheduler to populate planners for this week.</div>';
      return;
    }
    body.innerHTML = data.farms.map(farmBlock).join('');
  }

  // Re-tick the countdown numbers and progress bars between polls.
  function tick(){
    document.querySelectorAll('.in-section.is-on').forEach(card => {
      const cd = card.querySelector('[data-countdown]');
      const pf = card.querySelector('[data-progress]');
      if(!cd || !pf) return;
      const started = cd.getAttribute('data-started');
      const ends    = cd.getAttribute('data-ends');
      const t = liveTiming({started_at: started, ends_at: ends});
      cd.textContent = fmtCountdown(t.seconds_remaining) + ' left';
      pf.style.width = t.pct.toFixed(1) + '%';

      // If a shift has just ended, force a poll so we pick up the next one.
      if(t.seconds_remaining === 0 && Date.now() - lastFetchEpoch > 5000){
        refresh(false);
      }
    });
    if($('in-now') && lastData){
      const fresh = new Date();
      $('in-now').textContent = fresh.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'});
    }
  }

  async function refresh(showLoading){
    if(showLoading){
      $('in-body').innerHTML = '<div class="in-loading">Loading…</div>';
    }
    setStatus('');
    try {
      const data = await fetchLive(currentFarm);
      lastData = data;
      lastFetchEpoch = Date.now();
      render(data);
    } catch (err) {
      setStatus('Could not load live sections: ' + (err.message || err));
    }
  }

  function schedule(){
    if(pollTimer) clearInterval(pollTimer);
    if(tickTimer) clearInterval(tickTimer);
    pollTimer = setInterval(() => refresh(false), POLL_MS);
    tickTimer = setInterval(tick, TICK_MS);
  }

  $('in-refresh').addEventListener('click', () => refresh(false));
  $('in-farm').addEventListener('change', e => {
    currentFarm = e.target.value;
    refresh(true);
  });

  refresh(true);
  schedule();
})();
</script>
{% endblock %}
